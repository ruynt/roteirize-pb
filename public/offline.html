<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0F4C5C" />
    <title>Roteirize PB offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #0f2433;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(15, 76, 92, 0.16), transparent 34%),
          #f5f7f8;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(15, 76, 92, 0.12);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.92);
        padding: 32px;
        box-shadow: 0 24px 70px rgba(15, 36, 51, 0.12);
        text-align: center;
      }

      img {
        width: 150px;
        height: auto;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        color: #0f4c5c;
        font-size: 28px;
        line-height: 1.1;
        font-weight: 900;
      }

      p {
        margin: 16px 0 0;
        color: #45617a;
        line-height: 1.7;
        font-size: 15px;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 999px;
        background: #0f4c5c;
        color: white;
        padding: 14px 22px;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: #10b981;
      }
    </style>
  </head>

  <body>
    <main>
      <img src="/branding/logo-header.png" alt="Roteirize PB" />
      <h1>Você está sem conexão</h1>
      <p>
        Algumas áreas do Roteirize PB precisam de internet para carregar mapas,
        fotos e recomendações. Verifique sua conexão e tente novamente.
      </p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
